name: Daily directory fetch

on:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch directories
        run: npm run fetch
        env:
          # Raises the GitHub API rate limit for the Pay.sh (pay-skills) fetcher.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/endpoints.json; then
            echo "No changes to data/endpoints.json"
          else
            git add data/endpoints.json
            git commit -m "chore: daily directory fetch ($(date -u +%Y-%m-%d))"
            git push
          fi
